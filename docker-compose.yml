version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: testtrack_postgres
    environment:
      POSTGRES_USER: testtrack
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: testtrack
    ports:
      - "5432:5432"
    volumes:
      - testtrack_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: testtrack_redis
    ports:
      - "6379:6379"
    volumes:
      - testtrack_redisdata:/data
    restart: unless-stopped

volumes:
  testtrack_pgdata:
  testtrack_redisdata:
